name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required to create GitHub Releases
  packages: write   # Required to publish Docker images to GHCR

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Linux artifacts
        run: ./gradlew assembleDist -PreleaseVersion="${{ steps.version.outputs.tag }}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/dist/
          retention-days: 1

  build-macos:
    name: Build macOS CLI (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build macOS CLI binaries
        run: ./gradlew assembleCliMacos -PreleaseVersion="${{ steps.version.outputs.tag }}"

      - name: Upload macOS CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: build/dist/
          retention-days: 1

  publish-docker:
    name: Docker ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: engine
            file: docker/engine/Dockerfile
          - image: gateway
            file: docker/gateway/Dockerfile
          - image: cli
            file: docker/cli/Dockerfile
          - image: sandbox
            file: docker/klaw-sandbox/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Check if prerelease
        id: prerelease
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push versioned tag
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/klaw-${{ matrix.image }}:${{ steps.version.outputs.tag }}

      - name: Tag as latest (stable releases only)
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/klaw-${{ matrix.image }}:latest \
            ghcr.io/${{ github.repository_owner }}/klaw-${{ matrix.image }}:${{ steps.version.outputs.tag }}

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, publish-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: release-dist/

      - name: List release artifacts
        run: ls -lh release-dist/

      - name: Generate checksums
        working-directory: release-dist
        run: sha256sum klaw-* > checksums.sha256 && cat checksums.sha256

      - name: Check if prerelease
        id: prerelease
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
