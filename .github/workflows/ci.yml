name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test -x allTests

      - name: Test (Native Linux)
        run: ./gradlew :cli:linuxX64Test

      - name: Test (JVM)
        run: ./gradlew :common:jvmTest :gateway:test :engine:test

      - name: Compile Native
        run: ./gradlew :common:compileKotlinLinuxX64 :common:compileKotlinLinuxArm64 :cli:compileKotlinLinuxX64 :cli:compileKotlinLinuxArm64

      - name: Code Quality
        run: ./gradlew ktlintCheck detekt

      - name: Lint shell scripts
        run: shellcheck scripts/get-klaw.sh scripts/install-klaw.sh

  build-cli-linux:
    name: CLI (Linux x64 + arm64)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Link release executables
        run: ./gradlew :cli:linkReleaseExecutableLinuxX64 :cli:linkReleaseExecutableLinuxArm64

      - name: Upload CLI binaries
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux
          path: |
            cli/build/bin/linuxX64/releaseExecutable/klaw.kexe
            cli/build/bin/linuxArm64/releaseExecutable/klaw.kexe
          retention-days: 7

  build-cli-macos:
    name: CLI (macOS arm64 + x64)
    needs: [build]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Link release executables
        run: ./gradlew :cli:linkReleaseExecutableMacosArm64 :cli:linkReleaseExecutableMacosX64

      - name: Upload CLI binaries
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos
          path: |
            cli/build/bin/macosArm64/releaseExecutable/klaw.kexe
            cli/build/bin/macosX64/releaseExecutable/klaw.kexe
          retention-days: 7

  publish-docker:
    name: Docker ${{ matrix.image }}
    needs: [build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: engine
            file: docker/engine/Dockerfile
          - image: gateway
            file: docker/gateway/Dockerfile
          - image: cli
            file: docker/cli/Dockerfile
          - image: sandbox
            file: docker/klaw-sandbox/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/klaw-${{ matrix.image }}:unstable
